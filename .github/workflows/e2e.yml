name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start Temporal (PostgreSQL + server)
        run: docker compose up -d postgresql temporal

      - name: Wait for Temporal to be ready
        run: |
          python - <<'EOF'
          import asyncio, sys
          from datetime import timedelta

          async def wait():
              from temporalio.client import Client
              for i in range(60):
                  try:
                      await Client.connect("localhost:7233", rpc_timeout=timedelta(seconds=2))
                      print("Temporal is ready!")
                      return
                  except Exception as e:
                      print(f"Waiting for Temporal ({i+1}/60): {e}")
                      await asyncio.sleep(2)
              print("ERROR: Temporal did not become ready in time", file=sys.stderr)
              sys.exit(1)

          asyncio.run(wait())
          EOF

      - name: Run E2E tests
        run: pytest -v -m e2e --timeout=300

      - name: Show Temporal logs on failure
        if: failure()
        run: docker compose logs temporal

      - name: Tear down services
        if: always()
        run: docker compose down -v
